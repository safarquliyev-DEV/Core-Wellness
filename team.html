<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="icon" href="./assets/CoreWellness.png" type="image/png">

  <style>
    /* ===== TEAM MODAL – PROFILE CARD STYLE ===== */
    #teamModal .modal-dialog {
      max-width: 500px;
    }

    #teamModal .modal-content {
      background: transparent;
      border: none;
      box-shadow: none;
    }

    /* THE CARD */
    .profile-card {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.85);
      min-height: 640px;
    }

    /* BG PHOTO LAYER */
    .profile-bg-photo {
      position: absolute;
      inset: 0;
      background: url('./assets/team/menu/Treatment2.webp') center/cover no-repeat;
      z-index: 0;
    }

    /* FLAG LAYER */
    .profile-bg-flag {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.2;
      background-size: cover;
      background-position: center;
    }

    /* DARK OVERLAY */
    .profile-bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
          rgba(5, 10, 20, 0.4) 0%,
          rgba(5, 10, 20, 0.55) 35%,
          rgba(5, 10, 20, 0.92) 65%,
          rgba(5, 10, 20, 0.99) 100%);
      z-index: 2;
    }

    /* CONTENT */
    .profile-content {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      min-height: 640px;
    }

    /* CLOSE BUTTON */
    .profile-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(196, 155, 111, 0.15);
      border: 1px solid rgba(196, 155, 111, 0.4);
      color: #C49B6F;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      z-index: 10;
    }

    .profile-close:hover {
      background: #C49B6F;
      color: #0f2438;
    }

    /* TOP: PHOTO FULL WIDTH + NAME OVERLAY */
    .profile-top {
      position: relative;
      width: 100%;
      height: 340px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    /* PHOTO — full width, bottom-aligned */
    .profile-photo-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    .profile-photo-flag {
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    .profile-photo-wrapper img {
      position: relative;
      z-index: 2;
      height: 100%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      object-position: bottom center;
      border: none;
      background: transparent;
      display: block;
      max-height: 340px;
      /* ← ƏLAVƏ ET */
      margin: 0 auto;
      /* ← ƏLAVƏ ET */
    }

    /* NAME BLOCK — overlaid at bottom-left */
    .profile-name-block {
      position: relative;
      z-index: 5;
      padding: 60px 28px 20px;
      flex: 1;
      background: linear-gradient(0deg, rgba(5, 10, 20, 0.85) 0%, transparent 100%);
    }

    .profile-nationality {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.55);
      text-transform: uppercase;
      margin-bottom: 6px;
      font-family: 'Montserrat', sans-serif;
    }

    .profile-flag-emoji {
      font-size: 14px;
    }

    .profile-firstname {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 300;
      color: #fff;
      line-height: 0.95;
      letter-spacing: -1px;
    }

    .profile-lastname {
      font-family: 'Cormorant Garamond', serif;
      font-size: 44px;
      font-weight: 700;
      color: #C49B6F;
      line-height: 0.95;
      letter-spacing: -1px;
    }

    /* DIVIDER */
    .profile-divider {
      margin: 20px 32px 0;
      height: 1px;
      background: linear-gradient(90deg, #C49B6F, rgba(196, 155, 111, 0.05));
    }

    /* ROLE */
    .profile-role {
      padding: 14px 32px 0;
    }

    .profile-role-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #C49B6F;
      text-transform: uppercase;
      font-family: 'Montserrat', sans-serif;
    }

    .profile-spec {
      font-size: 12px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.5px;
      margin-top: 2px;
      font-family: 'Montserrat', sans-serif;
    }

    /* SCROLL BODY */
    .profile-body {
      padding: 16px 32px 0;
      flex: 1;
      max-height: 260px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #C49B6F transparent;
    }

    .profile-body::-webkit-scrollbar {
      width: 3px;
    }

    .profile-body::-webkit-scrollbar-thumb {
      background: #C49B6F;
      border-radius: 3px;
    }

    .profile-body::-webkit-scrollbar-track {
      background: transparent;
    }

    /* QUALIFICATIONS */
    .profile-section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      color: rgba(196, 155, 111, 0.55);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-family: 'Montserrat', sans-serif;
    }

    .profile-qual-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .profile-qual-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.2px;
      font-family: 'Montserrat', sans-serif;
      line-height: 1.5;
    }

    .profile-qual-list li::before {
      content: "";
      width: 14px;
      min-width: 14px;
      height: 1px;
      background: #C49B6F;
      margin-top: 8px;
    }

    /* SUMMARY */
    .profile-summary {
      font-size: 11px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.7;
      font-family: 'Montserrat', sans-serif;
      margin-bottom: 16px;
    }

    /* BOTTOM BAR */
    .profile-bottom {
      margin-top: auto;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(196, 155, 111, 0.12);
    }

    .profile-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .profile-brand span {
      color: rgba(196, 155, 111, 0.5);
    }

    .profile-gender-tag {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
      font-family: 'Montserrat', sans-serif;
    }

    /* CORNER ACCENTS */
    .profile-corner-tl {
      position: absolute;
      top: 14px;
      left: 14px;
      width: 22px;
      height: 22px;
      border-top: 1.5px solid rgba(196, 155, 111, 0.4);
      border-left: 1.5px solid rgba(196, 155, 111, 0.4);
      z-index: 4;
    }

    .profile-corner-br {
      position: absolute;
      bottom: 14px;
      right: 14px;
      width: 22px;
      height: 22px;
      border-bottom: 1.5px solid rgba(196, 155, 111, 0.4);
      border-right: 1.5px solid rgba(196, 155, 111, 0.4);
      z-index: 4;
    }

    /* NATIONALITY → FLAG GRADIENT MAP */
    .flag-philippine {
      background: linear-gradient(180deg, #0038A8 50%, #CE1126 50%);
    }

    .flag-russian {
      background: linear-gradient(180deg, #fff 33%, #0039A6 33% 66%, #D52B1E 66%);
    }

    .flag-tunisian {
      background: #E70013;
    }

    .flag-eritrean {
      background: linear-gradient(135deg, #4189DD 33%, #4FAE47 33% 66%, #E32118 66%);
    }

    .flag-argentinian {
      background: linear-gradient(180deg, #74ACDF 33%, #fff 33% 66%, #74ACDF 66%);
    }

    .flag-indonesian {
      background: linear-gradient(180deg, #CE1126 50%, #fff 50%);
    }

    .flag-bangladeshi {
      background: #006A4E;
    }

    .flag-nepalian {
      background: #003893;
    }

    .flag-syrian {
      background: linear-gradient(180deg, #CE1126 33%, #fff 33% 66%, #000 66%);
    }

    /* NATIONALITY EMOJI MAP */

    /* Modal animation */
    #teamModal .modal-dialog {
      transform: scale(0.85);
      transition: transform 0.4s ease;
    }

    #teamModal.show .modal-dialog {
      transform: scale(1);
    }

    @media (max-width: 576px) {
      #teamModal .modal-dialog {
        margin: 10px;
        max-width: calc(100vw - 20px);
      }

      .profile-top {
        min-height: 180px;
        padding: 32px 22px 0;
      }

      .profile-firstname {
        font-size: 32px;
      }

      .profile-lastname {
        font-size: 36px;
      }

      .profile-photo-wrapper {
        width: 90px;
        height: 130px;
      }

      .profile-divider {
        margin: 16px 22px 0;
      }

      .profile-role {
        padding: 12px 22px 0;
      }

      .profile-body {
        padding: 14px 22px 0;
        max-height: 200px;
      }

      .profile-bottom {
        padding: 12px 22px;
      }
    }
  </style>
</head>

<body class="page-team">

  <div class="container mt-5">
    <!-- FILTER BUTTONS -->
    <div class="text-center mb-4">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="female">Female</button>

    <!-- TEAM LIST -->
    <div class="row" id="teamContainer"></div>

  <!-- ===== TEAM MODAL – PROFILE CARD ===== -->
  <div class="modal fade" id="teamModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="profile-card">
          <!-- BG LAYERS -->
          <div class="profile-bg-photo" id="modalBgPhoto"></div>
          <div class="profile-bg-flag" id="modalBgFlag"></div>
          <div class="profile-bg-overlay"></div>

          <!-- CORNERS -->
          <div class="profile-corner-tl"></div>
          <div class="profile-corner-br"></div>

          <!-- CLOSE -->
          <button class="profile-close" data-bs-dismiss="modal">×</button>

          <!-- CONTENT -->
          <div class="profile-content">

            <!-- TOP: BIG PHOTO + NAME OVERLAY -->
            <div class="profile-top">
              <!-- PHOTO LAYER -->
              <div class="profile-photo-wrapper">
                <div class="profile-photo-flag" id="modalPhotoFlag"></div>
                <img id="modalImg" src="" alt="Profile Photo">
              </div>
              <!-- NAME OVERLAY -->
              <div class="profile-name-block">
                <div class="profile-nationality">
                  <span class="profile-flag-emoji" id="modalFlagEmoji"></span>
                  <span id="modalNationality"></span>
                </div>
                <div class="profile-firstname" id="modalFirstName"></div>
                <div class="profile-lastname" id="modalLastName"></div>
              </div>
            </div>

            <!-- DIVIDER -->
            <div class="profile-divider"></div>

            <!-- ROLE -->
            <div class="profile-role">
              <div class="profile-role-title" id="modalRole"></div>
              <div class="profile-spec" id="modalSpec"></div>
            </div>

            <!-- SCROLL BODY -->
            <div class="profile-body">

              <!-- QUALIFICATIONS -->
              <div class="profile-section-label">Qualifications</div>
              <ul class="profile-qual-list" id="modalQual"></ul>

              <!-- SUMMARY -->
              <div class="profile-section-label">About</div>
              <div class="profile-summary" id="modalSummary"></div>

            </div>

            <!-- BOTTOM -->
            <div class="profile-bottom">
              <div class="profile-brand">Core <span>Wellness</span></div>
              <div class="profile-gender-tag" id="modalGenderTag"></div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./script.js"></script>
  <script src="./team.js"></script>

  <script>
    // NATIONALITY → FLAG CONFIG
    const nationalityConfig = {
      "Filipino": { emoji: "🇵🇭", flagClass: "flag-philippine" },
      "Russian": { emoji: "🇷🇺", flagClass: "flag-russian" },
      "Tunisian": { emoji: "🇹🇳", flagClass: "flag-tunisian" },
      "Eritrean": { emoji: "🇪🇷", flagClass: "flag-eritrean" },
      "Argentinian": { emoji: "🇦🇷", flagClass: "flag-argentinian" },
      "Indonesian": { emoji: "🇮🇩", flagClass: "flag-indonesian" },
      "Bangladeshi": { emoji: "🇧🇩", flagClass: "flag-bangladeshi" },
      "Nepalian": { emoji: "🇳🇵", flagClass: "flag-nepalian" },
      "Syrian": { emoji: "🇸🇾", flagClass: "flag-syrian" },
    };

    // OVERRIDE openModal from team.js
    function openModal(id) {
      const member = teamData.find(m => m.id === id);
      if (!member) return;

      // Split name (first + last)
      const nameParts = member.name.trim().split(" ");
      const firstName = nameParts[0] || "";
      const lastName = nameParts.slice(1).join(" ") || firstName;
      document.getElementById("modalFirstName").textContent = firstName;
      document.getElementById("modalLastName").textContent = nameParts.length > 1 ? lastName : "";

      // Nationality + flag
      const nat = member.nationality || "";
      const config = nationalityConfig[nat] || { emoji: "🌍", flagClass: "" };
      document.getElementById("modalNationality").textContent = nat.toUpperCase();
      document.getElementById("modalFlagEmoji").textContent = config.emoji;

      // Photo flag background
      const photoFlag = document.getElementById("modalPhotoFlag");
      photoFlag.className = "profile-photo-flag " + config.flagClass;

      // Modal bg flag
      const bgFlag = document.getElementById("modalBgFlag");
      bgFlag.className = "profile-bg-flag " + config.flagClass;

      // Photo
      document.getElementById("modalImg").src = member.img;

      // Role & specializations
      document.getElementById("modalRole").textContent = member.role || "";
      document.getElementById("modalSpec").textContent = member.specializations || "";

      // Qualifications
      const qualEl = document.getElementById("modalQual");
      qualEl.innerHTML = "";
      const quals = Array.isArray(member.qualification)
        ? member.qualification
        : [member.qualification];
      quals.forEach(q => {
        if (q && q.trim()) {
          const li = document.createElement("li");
          li.textContent = q.trim();
          qualEl.appendChild(li);
        }
      });

      // Summary
      document.getElementById("modalSummary").textContent = member.summary || "";

      // Gender tag
      document.getElementById("modalGenderTag").textContent =
        member.gender === "female" ? "FEMALE TEAM" : "MALE TEAM";

      // Show
      new bootstrap.Modal(document.getElementById("teamModal")).show();
    }
  </script>
</body>

</html>
